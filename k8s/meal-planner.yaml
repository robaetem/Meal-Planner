apiVersion: v1
kind: Namespace
metadata:
  name: meal-planner
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meal-planner-postgres-data
  namespace: meal-planner
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meal-planner-postgres
  namespace: meal-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meal-planner-postgres
  template:
    metadata:
      labels:
        app: meal-planner-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: meal-planner-postgres-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mealplanner
                - -d
                - mealplanner
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meal-planner-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: meal-planner-postgres
  namespace: meal-planner
spec:
  selector:
    app: meal-planner-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meal-planner-web
  namespace: meal-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meal-planner-web
  template:
    metadata:
      labels:
        app: meal-planner-web
    spec:
      containers:
        - name: web
          image: meal-planner:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: meal-planner-web-env
          readinessProbe:
            httpGet:
              path: /signin
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /signin
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: meal-planner-web
  namespace: meal-planner
spec:
  selector:
    app: meal-planner-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meal-planner-web
  namespace: meal-planner
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: meal-planner.usemillie.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meal-planner-web
                port:
                  number: 3000
  tls:
    - hosts:
        - meal-planner.usemillie.com
      secretName: meal-planner-web-tls
